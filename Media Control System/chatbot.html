<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Control - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: #1e1e1e;
            border: 2px solid #d49a26;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(212, 154, 38, 0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, #d49a26, #f5c756);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .logo h1 {
            color: #d49a26;
            font-size: 24px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #282828;
            color: #6b7280;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .tab.active {
            background: linear-gradient(135deg, #d49a26, #f5c756);
            color: #141414;
        }
        .form {
            display: none;
        }
        .form.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #d49a26;
            font-size: 13px;
        }
        .form-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid rgba(212, 154, 38, 0.3);
            border-radius: 10px;
            background: #282828;
            color: white;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #d49a26;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #d49a26, #f5c756);
            color: #141414;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 154, 38, 0.4);
        }
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            display: none;
        }
        .message.success { background: rgba(16, 185, 129, 0.15); color: #10b981; display: block; }
        .message.error { background: rgba(239, 68, 68, 0.15); color: #ef4444; display: block; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">🤖</div>
            <h1>Media Control</h1>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="showLogin()">Sign In</button>
            <button class="tab" onclick="showSignup()">Sign Up</button>
        </div>

        <form class="form active" id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="admin@mediacontrol.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="submit-btn">Sign In</button>
            <div class="message" id="login-message"></div>
        </form>

        <form class="form" id="signup-form" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signup-name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signup-email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signup-password" placeholder="Min 3 characters" required minlength="3">
            </div>
            <button type="submit" class="submit-btn">Create Account</button>
            <div class="message" id="signup-message"></div>
        </form>
    </div>

    <script>
        // Initialize default admin user
        if (!localStorage.getItem('users')) {
            localStorage.setItem('users', JSON.stringify([
                {
                    email: 'admin@mediacontrol.com',
                    password: 'admin123',
                    name: 'Administrator',
                    role: 'admin'
                }
            ]));
        }

        function showLogin() {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('login-form').classList.add('active');
            document.getElementById('signup-form').classList.remove('active');
            document.querySelectorAll('.message').forEach(m => {
                m.className = 'message';
                m.textContent = '';
            });
        }

        function showSignup() {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('login-form').classList.remove('active');
            document.getElementById('signup-form').classList.add('active');
            document.querySelectorAll('.message').forEach(m => {
                m.className = 'message';
                m.textContent = '';
            });
        }

        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const msg = document.getElementById('login-message');

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
                msg.className = 'message success';
                msg.textContent = '✅ Login successful! Redirecting...';
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else {
                msg.className = 'message error';
                msg.textContent = '❌ Invalid email or password';
            }
        }

        function handleSignup(event) {
            event.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const msg = document.getElementById('signup-message');

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            
            // Check if user exists
            if (users.find(u => u.email === email)) {
                msg.className = 'message error';
                msg.textContent = '❌ Email already registered';
                return;
            }

            // Create new user
            const newUser = {
                email: email,
                password: password,
                name: name,
                role: 'user'
            };

            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));

            msg.className = 'message success';
            msg.textContent = '✅ Account created successfully! Switching to login...';
            
            setTimeout(() => {
                showLogin();
                document.getElementById('login-email').value = email;
                const loginMsg = document.getElementById('login-message');
                loginMsg.className = 'message success';
                loginMsg.textContent = 'Account created! Now enter your password to login';
            }, 2000);
        }
    </script>
</body>
</html>
